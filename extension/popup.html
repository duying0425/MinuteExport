<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 360px;
    padding: 16px;
    font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
    font-size: 13px;
    color: #1f2329;
  }
  h1 { font-size: 15px; margin: 0 0 12px; }
  label { display: block; margin-bottom: 6px; font-weight: 600; }
  input[type="text"] {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #dcdfe6;
    border-radius: 4px;
    box-sizing: border-box;
    font-size: 12px;
  }
  button {
    margin-top: 12px;
    width: 100%;
    padding: 9px 12px;
    background: #3370ff;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
  }
  button:disabled { background: #c0c4cc; cursor: not-allowed; }
  #status {
    margin-top: 12px;
    min-height: 18px;
    white-space: pre-wrap;
    color: #646a73;
  }
  #status.error { color: #d93025; }
  #status.ok { color: #1e8e3e; }
</style>
</head>
<body>
  <h1>飞书妙记导出</h1>
  <label for="url">妙记链接</label>
  <input id="url" type="text" placeholder="https://reachauto.feishu.cn/minutes/xxxx">
  <button id="export">导出为 Markdown</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
